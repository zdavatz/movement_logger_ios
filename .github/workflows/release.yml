name: Release to App Store

# Triggered when a tag like v0.0.6 is pushed. The tag name drives the version
# stamped into the built IPA — bump the patch by +0.0.1 each release.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # so we can create a GitHub release with the IPA attached

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 60

    env:
      APPLE_TEAM_ID: 4B37356EGR
      BUNDLE_ID: ch.pumptsueri.movementlogger

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF##*/}"           # e.g. v0.0.6
          VERSION="${TAG#v}"                # 0.0.6
          BUILD="${VERSION##*.}"            # 6 — patch component as build number
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"      >> "$GITHUB_OUTPUT"

      - name: Patch MARKETING_VERSION + CURRENT_PROJECT_VERSION in pbxproj
        run: |
          /usr/bin/sed -i '' \
            -e "s/MARKETING_VERSION = [0-9.]*;/MARKETING_VERSION = ${{ steps.ver.outputs.version }};/g" \
            -e "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = ${{ steps.ver.outputs.build }};/g" \
            MovementLogger.xcodeproj/project.pbxproj
          grep -E "MARKETING_VERSION|CURRENT_PROJECT_VERSION" MovementLogger.xcodeproj/project.pbxproj | head

      - name: Import signing certificate into temp keychain
        env:
          CERT_P12_BASE64:    ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD:      ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD:  ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '" ')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Stage App Store Connect API key
        env:
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          API_KEY_ID:        ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_P8_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Archive
        env:
          API_KEY_ID:     ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID:  ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcodebuild \
            -project MovementLogger.xcodeproj \
            -scheme MovementLogger \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MovementLogger.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID    "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            archive

      - name: Write ExportOptions.plist
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key><string>app-store-connect</string>
              <key>teamID</key><string>${APPLE_TEAM_ID}</string>
              <key>signingStyle</key><string>automatic</string>
              <key>uploadSymbols</key><true/>
              <key>destination</key><string>export</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        env:
          API_KEY_ID:     ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID:  ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MovementLogger.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID    "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Upload to App Store Connect
        env:
          API_KEY_ID:     ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID:  ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f build/export/MovementLogger.ipa \
            --type ios \
            --apiKey    "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Create GitHub release with IPA attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes "Automated release of ${{ steps.ver.outputs.version }} (build ${{ steps.ver.outputs.build }}) to App Store Connect." \
            build/export/MovementLogger.ipa \
            || echo "Release may already exist — skipping."

      - name: Tear down keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

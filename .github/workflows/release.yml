name: Release to App Store

# Triggered when a tag like v0.0.6 is pushed. The tag name drives the version
# stamped into the built IPA — bump the patch by +0.0.1 each release.
#
# Signing is MANUAL on purpose. The old automatic flow used
# `-allowProvisioningUpdates` + the App Store Connect API key, which makes
# Xcode mint a brand-new managed certificate on every clean runner. Apple
# caps certificates per account, so after enough releases the cap is hit and
# Archive fails with "Your account has reached the maximum number of
# certificates". Manual signing pins one fixed iOS Distribution cert + one
# App Store provisioning profile (both GitHub secrets), so CI never creates
# certificates and the build is reproducible.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # so we can create a GitHub release with the IPA attached

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 60

    env:
      APPLE_TEAM_ID: 4B37356EGR
      BUNDLE_ID: ch.pumptsueri.movementlogger

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF##*/}"           # e.g. v0.0.6
          VERSION="${TAG#v}"                # 0.0.6
          BUILD="${VERSION##*.}"            # 6 — patch component as build number
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"      >> "$GITHUB_OUTPUT"

      - name: Patch MARKETING_VERSION + CURRENT_PROJECT_VERSION in pbxproj
        run: |
          /usr/bin/sed -i '' \
            -e "s/MARKETING_VERSION = [0-9.]*;/MARKETING_VERSION = ${{ steps.ver.outputs.version }};/g" \
            -e "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = ${{ steps.ver.outputs.build }};/g" \
            MovementLogger.xcodeproj/project.pbxproj
          grep -E "MARKETING_VERSION|CURRENT_PROJECT_VERSION" MovementLogger.xcodeproj/project.pbxproj | head

      - name: Import signing certificate into temp keychain
        env:
          CERT_P12_BASE64:    ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD:      ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD:  ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERT_P12_BASE64" ]; then
            echo "::error::APPLE_CERT_P12_BASE64 is empty. It must hold an iOS"
            echo "::error::Distribution (.p12) certificate for manual signing."
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '" ')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # The signing identity name (e.g. "Apple Distribution: … (TEAMID)")
          # — derived from the keychain so we don't hard-code a name that
          # changes when the cert is regenerated.
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep -m1 -oE '"[^"]*(Distribution|Apple Distribution)[^"]*"' \
            | tr -d '"')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No iOS Distribution identity found in the imported"
            echo "::error::.p12 — APPLE_CERT_P12_BASE64 is not an iOS"
            echo "::error::Distribution certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using signing identity: $IDENTITY"

      - name: Install App Store provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$PROFILE_BASE64" ]; then
            echo "::error::APPLE_PROVISIONING_PROFILE_BASE64 is empty. Create an"
            echo "::error::App Store provisioning profile for $BUNDLE_ID in the"
            echo "::error::Apple Developer portal, export the .mobileprovision,"
            echo "::error::and add it base64-encoded as that GitHub secret."
            exit 1
          fi
          PROFILE_PATH="$RUNNER_TEMP/pp.mobileprovision"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Decode the plist inside the CMS envelope to read UUID + Name.
          PLIST="$RUNNER_TEMP/pp.plist"
          security cms -D -i "$PROFILE_PATH" > "$PLIST"
          UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PLIST")"
          NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PLIST")"

          DEST="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$DEST"
          cp "$PROFILE_PATH" "$DEST/$UUID.mobileprovision"

          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile '$NAME' ($UUID)"

      - name: Stage App Store Connect API key
        env:
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          API_KEY_ID:        ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_P8_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Archive
        run: |
          xcodebuild \
            -project MovementLogger.xcodeproj \
            -scheme MovementLogger \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MovementLogger.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

      - name: Write ExportOptions.plist
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key><string>app-store-connect</string>
              <key>teamID</key><string>${APPLE_TEAM_ID}</string>
              <key>signingStyle</key><string>manual</string>
              <key>signingCertificate</key><string>${SIGN_IDENTITY}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string>
              </dict>
              <key>uploadSymbols</key><true/>
              <key>destination</key><string>export</string>
          </dict>
          </plist>
          EOF
          cat build/ExportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MovementLogger.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload to App Store Connect
        env:
          API_KEY_ID:     ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID:  ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f build/export/MovementLogger.ipa \
            --type ios \
            --apiKey    "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Create GitHub release with IPA attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes "Automated release of ${{ steps.ver.outputs.version }} (build ${{ steps.ver.outputs.build }}) to App Store Connect." \
            build/export/MovementLogger.ipa \
            || echo "Release may already exist — skipping."

      - name: Submit for App Store review (auto-publish on approval)
        # Mirrors the Android "production track, status=completed" flow: once
        # the build finishes processing, attach it to the version, set
        # "What's New" from the tag/commit message, and submit for review with
        # releaseType=AFTER_APPROVAL (auto-publish the moment Apple approves).
        # Apple still requires human review — there is no API to skip it.
        env:
          APPLE_API_KEY_ID:    ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          BUNDLE_ID:           ${{ env.BUNDLE_ID }}
        run: |
          python3 -m venv "$RUNNER_TEMP/asc-venv"
          "$RUNNER_TEMP/asc-venv/bin/pip" install --quiet PyJWT requests cryptography

          # "What's New" = the annotated tag body, falling back to the commit
          # message of the tagged commit (lightweight tags). The script strips
          # the Co-Authored-By / 🤖 trailer lines.
          NOTES="$(git tag -l --format='%(contents)' "${{ steps.ver.outputs.tag }}")"
          if [ -z "$NOTES" ]; then NOTES="$(git log -1 --pretty=%B)"; fi
          printf '%s\n' "$NOTES" > "$RUNNER_TEMP/release_notes.txt"
          echo "Release notes:"; cat "$RUNNER_TEMP/release_notes.txt"

          "$RUNNER_TEMP/asc-venv/bin/python" scripts/submit_for_review.py \
            --version "${{ steps.ver.outputs.version }}" \
            --build "${{ steps.ver.outputs.build }}" \
            --notes-file "$RUNNER_TEMP/release_notes.txt" \
            --release-type AFTER_APPROVAL

      - name: Tear down keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
